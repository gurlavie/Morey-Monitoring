name: Moiry availability watch

on:
  schedule:
    - cron: "*/5 * * * *"   # GitHub minimum; each run loops 5x60s for ~1-min coverage
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: moiry-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - name: Check availability every 15 min for ~45 min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 4); do
            python3 monitor.py
            if [ "$i" -lt 4 ]; then sleep 900; fi
          done

      - name: Commit state if changed
        run: |
          git config user.name "moiry-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json log.csv
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash || true
            git commit -m "availability update $(date -u +%FT%TZ)"
            git push || true
          fi
